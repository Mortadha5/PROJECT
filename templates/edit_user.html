<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Utilisateur - Admin</title>
    <link rel="stylesheet" href="/static/css/modern-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-size: 14px; }
        .container { max-width: 550px; }

        .page-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.08) 0%, rgba(224, 168, 0, 0.08) 100%);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .page-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p { color: var(--text-secondary); font-size: 0.85rem; }

        .form-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-label {
            display: flex; align-items: center; gap: 0.4rem;
            margin-bottom: 0.4rem;
            font-weight: 600; font-size: 0.85rem;
            color: var(--text-primary);
        }
        .form-control, .form-select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.85rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        .form-control:focus, .form-select:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .alert-success { background: #d3f9d8; color: #2b8a3e; border: 1px solid #b2f2bb; }
        .alert-error { background: #ffe3e3; color: #c92a2a; border: 1px solid #ffc9c9; }

        .form-actions {
            display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem;
        }
        .form-actions .btn { border-radius: 10px; font-size: 0.82rem; padding: 0.6rem 1.2rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><i class="fas fa-brain"></i> Formation IA</div>
        <div class="navbar-nav">
            <div class="navbar-user">
                <i class="fas fa-user-circle"></i>
                <span>{{ session.username }}</span>
                <span class="badge badge-admin"><i class="fas fa-crown"></i> Admin</span>
            </div>
            <a href="{{ url_for('admin_users') }}" class="navbar-link"><i class="fas fa-users-cog"></i> Utilisateurs</a>
            <a href="{{ url_for('dashboard') }}" class="navbar-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="{{ url_for('index') }}" class="navbar-link"><i class="fas fa-home"></i> Accueil</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header animate-fade-in">
            <div style="margin-bottom: 0.5rem;"><span style="font-size: 1.8rem;">👤</span></div>
            <h1>Modifier l'utilisateur</h1>
            <p>Modifier les informations de {{ user.username }}</p>
        </div>

        {% if success %}
        <div class="alert alert-success"><i class="fas fa-check-circle"></i> {{ success }}</div>
        {% endif %}
        {% if error %}
        <div class="alert alert-error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}

        <div class="form-card animate-fade-in">
            <form method="POST">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-user"></i> Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-shield-alt"></i> Rôle</label>
                    <select name="role" class="form-select" required>
                        <option value="user" {% if user.role == 'user' %}selected{% endif %}>👤 Utilisateur</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>👑 Administrateur</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Sauvegarder</button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary"><i class="fas fa-times"></i> Annuler</a>
                </div>
            </form>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    <script src="/static/js/theme-toggle.js"></script>
</body>
</html>
