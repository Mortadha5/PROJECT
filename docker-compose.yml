services:
  backend:
    build: .
    container_name: formation-ia-backend
    ports:
      - "5555:5555"
    environment:
      - FLASK_ENV=production
      - MONGO_URI=mongodb://mongo:27017/
      - SECRET_KEY=change-this-to-a-secure-random-key-in-production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads:/app/static/uploads/avatars
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: formation-ia-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: formation-ia-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  uploads:
